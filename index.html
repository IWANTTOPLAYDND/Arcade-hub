<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arcade OS</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #0b0b12;
  color: white;
  text-align: center;
  overflow: hidden;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #a78bfa;
  background: #1e1e2e;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #a78bfa;
  color: black;
}

.screen {
  opacity: 1;
  transition: 0.25s ease;
}

.fade {
  opacity: 0;
}

.card {
  width: 360px;
  margin: 20px auto;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}

/* Snake grid */
.grid {
  display: grid;
  grid-template-columns: repeat(10, 20px);
  justify-content: center;
  margin-top: 10px;
}
.cell {
  width: 20px;
  height: 20px;
  font-size: 10px;
}
</style>
</head>

<body>

<h1>🎮 Arcade OS v2</h1>
<div id="app" class="screen"></div>

<script>
/* ------------------ STATE SYSTEM ------------------ */
const State = {
  clicks: 0,
  xp: Number(localStorage.getItem("xp")) || 0,
  bestReaction: Number(localStorage.getItem("best")) || null,

  save(){
    localStorage.setItem("xp", this.xp);
    localStorage.setItem("best", this.bestReaction);
  }
};

/* ------------------ SOUND ENGINE ------------------ */
const Sound = {
  beep(freq=440){
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();

    o.connect(g);
    g.connect(ctx.destination);

    o.frequency.value = freq;
    o.start();

    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
    o.stop(ctx.currentTime + 0.1);
  }
};

/* ------------------ NAV ENGINE ------------------ */
const app = document.getElementById("app");

function go(page){
  app.classList.add("fade");

  setTimeout(() => {
    app.innerHTML = pages[page]();
    app.classList.remove("fade");
  }, 150);
}

/* ------------------ XP SYSTEM ------------------ */
function addXP(x){
  State.xp += x;
  State.save();
}

/* ------------------ PAGES ------------------ */
const pages = {

home: () => `
  <div class="card">
    <h2>Welcome</h2>
    <button onclick="go('menu')">Enter Arcade</button>
  </div>
`,

menu: () => `
  <div class="card">
    <h2>Menu</h2>

    <button onclick="go('clicker')">Clicker</button>
    <button onclick="go('reaction')">Reaction</button>
    <button onclick="go('snake')">Snake</button>
    <button onclick="go('flappy')">Flappy</button>

    <p>XP: ${State.xp}</p>

    <button onclick="go('home')">Exit</button>
  </div>
`,

clicker: () => `
  <div class="card">
    <h2>Clicker</h2>
    <p id="c">${State.clicks}</p>
    <button onclick="clicker()">Click</button>
    <br><br>
    <button onclick="go('menu')">Back</button>
  </div>
`,

reaction: () => `
  <div class="card">
    <h2>Reaction</h2>
    <p id="r">Wait...</p>
    <button onclick="react()">Tap</button>
    <br><br>
    <button onclick="go('menu')">Back</button>
  </div>
`,

snake: () => {
  setTimeout(initSnake, 50);
  return `
    <div class="card">
      <h2>Snake</h2>
      <div id="grid"></div>
      <button onclick="go('menu')">Back</button>
    </div>
  `;
},

flappy: () => `
  <div class="card">
    <h2>Flappy Lite</h2>
    <p id="f">Press click to jump</p>
    <button onclick="flap()">Flap</button>
    <br><br>
    <button onclick="go('menu')">Back</button>
  </div>
`

};

/* ------------------ CLICKER ------------------ */
function clicker(){
  State.clicks++;
  addXP(1);
  Sound.beep(600);
  document.getElementById("c").innerText = State.clicks;
}

/* ------------------ REACTION ------------------ */
let start = Date.now();
setTimeout(()=> start = Date.now(), 1500);

function react(){
  let t = Date.now() - start;

  if(!State.bestReaction || t < State.bestReaction){
    State.bestReaction = t;
    State.save();
  }

  Sound.beep(900);

  document.getElementById("r").innerText =
    `Time: ${t}ms | Best: ${State.bestReaction}`;
}

/* ------------------ SNAKE ------------------ */
let snake, dir, food, interval;

function initSnake(){
  snake = [{x:5,y:5}];
  dir = {x:1,y:0};
  food = {x:2,y:2};

  document.onkeydown = e => {
    if(e.key==="ArrowUp") dir={x:0,y:-1};
    if(e.key==="ArrowDown") dir={x:0,y:1};
    if(e.key==="ArrowLeft") dir={x:-1,y:0};
    if(e.key==="ArrowRight") dir={x:1,y:0};
  };

  clearInterval(interval);
  interval = setInterval(updateSnake, 250);
}

function updateSnake(){
  let head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food = {
      x: Math.floor(Math.random()*10),
      y: Math.floor(Math.random()*10)
    };
    addXP(10);
    Sound.beep(700);
  } else {
    snake.pop();
  }

  drawSnake();
}

function drawSnake(){
  let html = `<div class="grid">`;

  for(let y=0;y<10;y++){
    for(let x=0;x<10;x++){
      let isS = snake.some(s=>s.x===x && s.y===y);
      let isF = food.x===x && food.y===y;

      html += `<div class="cell">${
        isF ? "🍎" : isS ? "🟩" : ""
      }</div>`;
    }
  }

  html += `</div>`;
  document.getElementById("grid").innerHTML = html;
}

/* ------------------ FLAPPY LITE ------------------ */
let f = 5;
function flap(){
  f -= 2;
  Sound.beep(500);

  setTimeout(()=>{
    f++;
    document.getElementById("f").innerText = "Height: " + f;
  }, 300);

  document.getElementById("f").innerText = "Height: " + f;
}

/* ------------------ START ------------------ */
go("home");
</script>

</body>
</html>
